name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.14
        required: true
        type: string
      prerelease:
        description: Mark as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize release version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag ${RELEASE_TAG} already exists locally."
          elif git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          else
            git tag -a "${RELEASE_TAG}" -m "OpenOIDC ${RELEASE_TAG}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Trigger Docker image workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docker-image.yml --ref "${RELEASE_TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OpenOIDC ${{ env.RELEASE_TAG }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: false
